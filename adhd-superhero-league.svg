<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="1200" viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with superhero gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF1493;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD93D;stop-opacity:1" />
    </linearGradient>
    <filter id="heroGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="1200" height="1200" fill="url(#bgGradient)"/>
  
  <!-- Comic book background pattern -->
  <g fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.4">
    <circle cx="200" cy="200" r="150"/>
    <circle cx="1000" cy="200" r="120"/>
    <circle cx="200" cy="1000" r="180"/>
    <circle cx="1000" cy="1000" r="140"/>
    <rect x="100" y="100" width="300" height="300" transform="rotate(15 250 250)"/>
    <rect x="800" y="800" width="280" height="320" transform="rotate(-10 940 960)"/>
  </g>
  
  <!-- Superhero ADHD characters -->
  <g transform="translate(600,480)">
    <!-- Character 1 - Speedster -->
    <circle cx="-200" cy="0" r="60" fill="#FF6B6B" opacity="0.9"/>
    <ellipse cx="-200" cy="30" rx="40" ry="35" fill="#FFD93D"/>
    <circle cx="-215" cy="20" r="10" fill="#FFFFFF"/>
    <circle cx="-205" cy="15" r="4" fill="#333333"/>
    <circle cx="-190" cy="20" r="10" fill="#FFFFFF"/>
    <circle cx="-180" cy="15" r="4" fill="#333333"/>
    <path d="M-210,45 Q-200,55 -190,45" stroke="#333333" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M-260,-20 L-280,-40" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round"/>
    <path d="M-260,20 L-280,40" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round"/>
    
    <!-- Character 2 - Telepath -->
    <circle cx="0" cy="0" r="70" fill="#6BCB77" opacity="0.9"/>
    <ellipse cx="0" cy="35" rx="45" ry="40" fill="#FFE66D"/>
    <circle cx="-20" cy="20" r="12" fill="#FFFFFF"/>
    <circle cx="-15" cy="18" r="5" fill="#333333"/>
    <circle cx="0" cy="20" r="12" fill="#FFFFFF"/>
    <circle cx="5" cy="18" r="5" fill="#333333"/>
    <path d="M-15,45 Q0,58 15,45" stroke="#333333" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Brains around head -->
    <circle cx="-50" cy="-40" r="15" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="50" cy="-40" r="12" fill="#FFFFFF" opacity="0.7"/>
    <path d="M0,-60 L-50,-40 L50,-40 Z" fill="#FFFFFF" opacity="0.6"/>
    
    <!-- Character 3 - Energy -->
    <circle cx="200" cy="0" r="65" fill="#A29BFE" opacity="0.9"/>
    <ellipse cx="200" cy="32" rx="42" ry="37" fill="#FF8B94"/>
    <circle cx="182" cy="22" r="11" fill="#FFFFFF"/>
    <circle cx="177" cy="20" r="4" fill="#333333"/>
    <circle cx="195" cy="22" r="11" fill="#FFFFFF"/>
    <circle cx="200" cy="20" r="4" fill="#333333"/>
    <path d="M185,42 Q200,55 215,42" stroke="#333333" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Lightning bolts -->
    <polygon points="260,-30 275,-30 265,-10 275,10 255,0 265,-20" fill="#FFD93D" filter="url(#heroGlow)"/>
    <polygon points="260,30 275,30 265,10 275,-10 255,0 265,20" fill="#FFD93D" filter="url(#heroGlow)"/>
  </g>
  
  <!-- Team badge -->
  <g transform="translate(600,620)">
    <polygon points="0,-60 55,-35 40,25 0,55 -40,25 -55,-35" fill="#FFD93D" filter="url(#heroGlow)"/>
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#FF1493" text-anchor="middle" style="text-shadow: 2px 2px 4px rgba(0,0,0,0.3)">ADHD</text>
  </g>
  
  <!-- League text -->
  <text x="600" y="730" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#FFFFFF" text-anchor="middle" filter="url(#heroGlow)" style="font-style: italic">LEAGUE</text>
  
  <!-- Comic style action words -->
  <g fill="#FFFFFF" opacity="0.9" filter="url(#heroGlow)">
    <text x="150" y="150" font-family="Arial, sans-serif" font-size="28" font-weight="bold">ZOOM!</text>
    <text x="950" y="180" font-family="Arial, sans-serif" font-size="26" font-weight="bold">BOOM!</text>
    <text x="150" y="1050" font-family="Arial, sans-serif" font-size="30" font-weight="bold">WHOOSH!</text>
    <text x="950" y="1020" font-family="Arial, sans-serif" font-size="27" font-weight="bold">ZAP!</text>
  </g>
  
  <!-- Stars around edges -->
  <g fill="#FFFFFF" opacity="0.8">
    <path d="M100,100 L110,130 L140,130 L115,150 L125,180 L100,160 L75,180 L85,150 L60,130 L90,130 Z"/>
    <path d="M1100,100 L1110,130 L1140,130 L1115,150 L1125,180 L1100,160 L1075,180 L1085,150 L1060,130 L1090,130 Z"/>
    <path d="M100,1100 L110,1130 L140,1130 L115,1150 L125,1180 L100,1160 L75,1180 L85,1150 L60,1130 L90,1130 Z"/>
    <path d="M1100,1100 L1110,1130 L1140,1130 L1115,1150 L1125,1180 L1100,1160 L1075,1180 L1085,1150 L1060,1130 L1090,1130 Z"/>
  </g>
  
  <!-- Cape flowing behind -->
  <path d="M350,500 Q300,600 350,700 Q400,800 450,700 Q500,600 450,500" fill="#FF1493" opacity="0.7"/>
  <path d="M850,500 Q900,600 850,700 Q800,800 750,700 Q700,600 750,500" fill="#FF1493" opacity="0.7"/>
  
  <!-- Shield icons -->
  <g fill="#FFFFFF" opacity="0.6">
    <path d="M250,250 L270,230 Q300,250 270,270 Q250,290 230,270 Q200,250 230,230 Z"/>
    <path d="M950,250 L970,230 Q1000,250 970,270 Q950,290 930,270 Q900,250 930,230 Z"/>
    <path d="M250,950 L270,930 Q300,950 270,970 Q250,990 230,970 Q200,950 230,930 Z"/>
    <path d="M950,950 L970,930 Q1000,950 970,970 Q950,990 930,970 Q900,950 930,930 Z"/>
  </g>
</svg>
