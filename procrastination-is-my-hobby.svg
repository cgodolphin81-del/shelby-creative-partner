<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="1200" viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with warm, cozy gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A8E6CF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFD3B6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8B94;stop-opacity:1" />
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="1200" height="1200" fill="url(#bgGradient)"/>
  
  <!-- Procrastination icons floating around -->
  <g opacity="0.3">
    <!-- Phone -->
    <rect x="150" y="150" width="60" height="90" rx="5" fill="#FFFFFF"/>
    <rect x="165" y="170" width="30" height="5" fill="#333333"/>
    <!-- Coffee cup -->
    <path d="M1000,150 L1000,200 Q1000,215 1015,215 L1045,215 Q1060,215 1060,200 L1060,160 Q1060,150 1050,150" fill="#FFFFFF"/>
    <path d="M1050,160 Q1060,150 1060,160 L1060,165 Q1060,180 1050,180" fill="none" stroke="#FFFFFF" stroke-width="3"/>
    <!-- TV remote -->
    <rect x="50" y="900" width="40" height="70" rx="3" fill="#FFFFFF" transform="rotate(-15 70 935)"/>
    <!-- Books -->
    <rect x="1100" y="900" width="50" height="70" fill="#FFFFFF" transform="rotate(10 1125 935)"/>
    <rect x="1110" y="910" width="40" height="10" fill="#FFFFFF"/>
    <rect x="1110" y="925" width="40" height="10" fill="#FFFFFF"/>
  </g>
  
  <!-- Relaxed person chilling -->
  <g transform="translate(600,550)">
    <!-- Chair -->
    <path d="M-100,100 L-80,80 L80,80 L100,100" stroke="#333333" stroke-width="8" fill="none" stroke-linecap="round"/>
    <rect x="-60" y="80" width="120" height="60" rx="10" fill="#FFD3B6"/>
    <!-- Person sitting relaxed -->
    <ellipse cx="0" cy="40" rx="50" ry="40" fill="#88D8B0"/>
    <circle cx="0" cy="0" r="35" fill="#FFD3B6"/>
    <!-- Relaxed face -->
    <circle cx="-12" cy="-5" r="5" fill="#333333"/>
    <circle cx="12" cy="-5" r="5" fill="#333333"/>
    <path d="M-8,10 Q0,15 8,10" stroke="#333333" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Hands up -->
    <ellipse cx="-60" cy="30" rx="15" ry="20" fill="#FFD3B6" transform="rotate(-30 -60 30)"/>
    <ellipse cx="60" cy="30" rx="15" ry="20" fill="#FFD3B6" transform="rotate(30 60 30)"/>
    <!-- Controller/phone in hand -->
    <rect x="-70" y="20" width="20" height="12" rx="3" fill="#333333" transform="rotate(-30 -70 20)"/>
    <rect x="50" y="20" width="20" height="12" rx="3" fill="#333333" transform="rotate(30 50 20)"/>
  </g>
  
  <!-- Relaxed brain with closed eyes -->
  <g transform="translate(600,750)">
    <ellipse cx="0" cy="0" rx="80" ry="60" fill="#88D8B0" opacity="0.9"/>
    <path d="M-80,0 Q-90,-30 -80,-60 Q-70,-90 -40,-90 Q-10,-90 0,-60 Q10,-90 40,-90 Q70,-90 80,-60 Q90,-30 80,0 Q90,30 80,60 Q70,90 40,90 Q10,90 0,60 Q-10,90 -40,90 Q-70,90 -80,60 Q-90,30 -80,0" fill="#A8E6CF"/>
    <!-- Peaceful face -->
    <path d="M-25,-10 Q-20,-5 -25,0" stroke="#333333" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M25,-10 Q20,-5 25,0" stroke="#333333" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M-15,15 Q0,20 15,15" stroke="#333333" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Zen lines -->
    <path d="M-100,-50 L-80,-70" stroke="#FFFFFF" stroke-width="3"/>
    <path d="M100,-50 L80,-70" stroke="#FFFFFF" stroke-width="3"/>
    <path d="M-100,50 L-80,70" stroke="#FFFFFF" stroke-width="3"/>
    <path d="M100,50 L80,70" stroke="#FFFFFF" stroke-width="3"/>
  </g>
  
  <!-- Main text - playful and chill -->
  <text x="600" y="420" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#FFFFFF" text-anchor="middle" filter="url(#softGlow)">PROCRASTINATION</text>
  <text x="600" y="490" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#FFFFFF" text-anchor="middle" filter="url(#softGlow)">IS MY</text>
  <text x="600" y="570" font-family="Arial, sans-serif" font-size="88" font-weight="bold" fill="#FFFFFF" text-anchor="middle" filter="url(#softGlow)">HOBBY</text>
  
  <!-- Chill vibes badges -->
  <g fill="#FFFFFF" opacity="0.8">
    <circle cx="250" cy="350" r="25"/>
    <circle cx="950" cy="350" r="25"/>
    <circle cx="250" y="850" cy="850" r="25"/>
    <circle cx="950" cy="850" r="25"/>
  </g>
  
  <!-- Small text at bottom -->
  <text x="600" y="1120" font-family="Arial, sans-serif" font-size="24" fill="#333333" text-anchor="middle">Because tomorrow is for doers (not me 😅)</text>
  
  <!-- Decorative doodles -->
  <g stroke="#FFFFFF" stroke-width="3" fill="none" opacity="0.6">
    <circle cx="400" cy="300" r="15"/>
    <circle cx="800" cy="300" r="20"/>
    <circle cx="400" cy="900" r="18"/>
    <circle cx="800" cy="900" r="22"/>
  </g>
  
  <!-- Lazy spiral -->
  <path d="M600,250 Q620,230 640,250 Q660,270 640,290 Q620,310 600,290 Q580,270 600,250" fill="none" stroke="#FFFFFF" stroke-width="3"/>
</svg>
