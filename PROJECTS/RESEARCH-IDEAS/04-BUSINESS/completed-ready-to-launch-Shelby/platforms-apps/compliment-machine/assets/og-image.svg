<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B9D;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF8E72;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD93D;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFF9F5;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Decorative Circles -->
  <circle cx="100" cy="100" r="80" fill="rgba(255,255,255,0.1)"/>
  <circle cx="1100" cy="530" r="120" fill="rgba(255,255,255,0.1)"/>
  <circle cx="600" cy="315" r="200" fill="rgba(255,255,255,0.05)"/>
  
  <!-- Sparkles -->
  <text x="150" cy="200" font-size="60" fill="rgba(255,255,255,0.3)">✨</text>
  <text x="1000" y="150" font-size="60" fill="rgba(255,255,255,0.3)">💫</text>
  <text x="200" y="500" font-size="60" fill="rgba(255,255,255,0.3)">🌟</text>
  <text x="950" y="550" font-size="60" fill="rgba(255,255,255,0.3)">✨</text>
  
  <!-- Main Title -->
  <text x="600" y="280" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="url(#textGradient)" text-anchor="middle">
    Infinite Compliment
  </text>
  <text x="600" y="370" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="url(#textGradient)" text-anchor="middle">
    Machine
  </text>
  
  <!-- Heart Icon -->
  <text x="600" y="220" font-size="80" text-anchor="middle">💝</text>
  
  <!-- Tagline -->
  <text x="600" y="450" font-family="Arial, sans-serif" font-size="32" fill="rgba(255,255,255,0.9)" text-anchor="middle" font-style="italic">
    Because you deserve to hear something wonderful today
  </text>
  
  <!-- Bottom Decoration -->
  <text x="600" y="550" font-size="40" text-anchor="middle" fill="rgba(255,255,255,0.5)">✨ 💖 🌟 💫 ✨</text>
</svg>
